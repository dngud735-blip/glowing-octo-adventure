<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PVC Mesh Cutting Calculator</title>
    <!-- 외부 라이브러리 (디자인 및 아이콘) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        
        :root { --primary: #2563eb; --bg-main: #f8fafc; }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-main);
            color: #1e293b;
            padding: 10px 14px 40px;
            -webkit-font-smoothing: antialiased;
            display: flex; flex-direction: column; align-items: center; 
            overflow-x: hidden;
        }

        .app-container { width: 100%; max-width: 380px; }

        /* 입력창 디자인: 하단 1px 테두리만 유지, 상단/좌우 제거, 90도 직각 */
        input[type="number"] {
            -webkit-appearance: none;
            border-bottom: 1px solid #d1d5db !important;
            border-top: none !important; border-left: none !important; border-right: none !important;
            border-radius: 0px !important; 
            padding: 0px; font-size: 1.25rem; font-weight: 700; text-align: center;
            width: 100%; height: 44px; line-height: 44px;
            color: #1e293b; background-color: #ffffff; outline: none; transition: all 0.2s;
        }
        input[type="number"]:focus { border-bottom-color: var(--primary) !important; background-color: #fff; }

        /* 라벨 디자인: 하단 테두리만 유지 */
        .grid-label {
            display: flex; align-items: center; justify-content: center;
            height: 44px; width: 100%; border-radius: 0px; 
            font-weight: 800; font-size: 13px;
            border-bottom: 1px solid currentColor !important;
            border-top: none !important; border-left: none !important; border-right: none !important;
            text-align: center; opacity: 0.85; 
        }

        .action-btn {
            height: 48px; width: 100%; display: flex; align-items: center; justify-content: center;
            border-radius: 0px; font-weight: 900; transition: all 0.2s; text-transform: uppercase;
        }

        .data-chip {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 1px; border-radius: 12px; font-family: 'Inter', sans-serif;
            font-weight: 900; width: 100%; letter-spacing: -0.04em;
            background: #ffffff; border: 2.5px solid currentColor; box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: slideUp 0.3s ease-out forwards; }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: white; padding: 14px 28px; border-radius: 100px;
            font-size: 0.95rem; font-weight: 700; z-index: 9999; opacity: 0;
            transition: all 0.3s; pointer-events: none; white-space: nowrap; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        #toast.show { opacity: 1; transform: translate(-50%, -20px); }

        .photo-row-item { transition: background 0.2s; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        .photo-row-item:active { background-color: #f1f5f9; }

        .loader {
            width: 22px; height: 22px; border: 3px solid #3b82f6; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .history-card { transition: all 0.2s; border-left: 8px solid #cbd5e1; }
        .history-card:active { transform: scale(0.98); background-color: #f8fafc; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="app-container">
        <!-- 상단 타이틀 바 -->
        <div class="bg-slate-900 text-white flex items-center justify-center font-black uppercase text-[11px] tracking-[0.25em] h-[42px] mb-0 rounded-t-[24px] shadow-lg border-b border-slate-700">
            <span>PVC Mesh Cutting Calculator</span>
        </div>

        <!-- 사진 분석 섹션 -->
        <div class="bg-white border-x border-slate-100 p-3 flex flex-col gap-3 shadow-sm">
            <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="handlePhotoUpload(this)">
            <button id="photoBtn" onclick="document.getElementById('photoInput').click(); haptic(15);" class="w-full h-12 bg-blue-600 text-white flex items-center justify-center gap-3 font-black rounded-xl shadow-md active:scale-95 transition-all text-sm">
                <i class="fa-solid fa-camera-retro text-lg"></i>
                재단데이터 사진 분석하기
            </button>

            <!-- 로딩 상태 -->
            <div id="aiLoading" class="hidden flex items-center justify-center p-5 bg-slate-50 rounded-xl border border-dashed border-blue-200">
                <span class="loader mr-3"></span>
                <span class="text-sm font-bold text-slate-600">AI가 데이터를 읽고 있습니다...</span>
            </div>

            <!-- 분석 결과 리스트 -->
            <div id="aiResultArea" class="hidden animate-in">
                <div class="flex items-center justify-between px-1 mb-2">
                    <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest leading-none">데이터 선택 (터치 시 입력)</span>
                    <button onclick="closeAiResult()" class="text-slate-400 p-1"><i class="fa-solid fa-circle-xmark text-lg"></i></button>
                </div>
                <div id="photoResultList" class="bg-slate-50 rounded-xl border border-slate-200 overflow-hidden shadow-inner max-h-[280px] overflow-y-auto"></div>
            </div>
        </div>

        <!-- 입력 영역 -->
        <main class="bg-white rounded-b-[24px] shadow-md p-3 border border-slate-100 border-t-0 flex flex-col gap-y-3">
            <div class="grid grid-cols-4 gap-y-3 gap-x-3 items-center">
                <label class="grid-label text-amber-600 border-amber-200 bg-amber-50/30">웨빙1</label>
                <input type="number" id="p1_in" onkeydown="handleEnter(event)">
                <label class="grid-label text-amber-600 border-amber-200 bg-amber-50/30">웨빙2</label>
                <input type="number" id="p2_in" onkeydown="handleEnter(event)">

                <label class="grid-label text-emerald-600 border-emerald-200 bg-emerald-50/30">원단 폭</label>
                <div class="col-span-3"><input type="number" id="r_in" onkeydown="handleEnter(event)" inputmode="decimal" placeholder="미입력 시 세로기준"></div>

                <label class="grid-label text-indigo-600 border-indigo-200 bg-indigo-50/30">가로</label>
                <input type="number" id="w_in" onkeydown="handleEnter(event)" inputmode="decimal">
                <label class="grid-label text-indigo-600 border-indigo-200 bg-indigo-50/30">세로</label>
                <input type="number" id="h_in" onkeydown="handleEnter(event)" inputmode="decimal">

                <label class="grid-label text-rose-600 border-rose-200 bg-rose-50/30">목표수량</label>
                <div class="col-span-3"><input type="number" id="q_goal" onkeydown="handleEnter(event)" inputmode="decimal"></div>

                <label class="grid-label text-slate-600 border-slate-300 bg-slate-100/50">완료수량</label>
                <div class="col-span-3"><input type="number" id="q_done" onkeydown="handleEnter(event)" inputmode="decimal"></div>
            </div>

            <div class="grid grid-cols-4 gap-x-2.5">
                <button onclick="resetForm()" class="col-span-1 action-btn bg-white text-black text-[11px] active:bg-slate-50 border border-slate-200 font-black">RESET</button>
                <button onclick="calculate()" class="col-span-3 action-btn bg-slate-900 text-white shadow-lg text-lg active:scale-95 font-black uppercase">GENERATE PLAN</button>
            </div>
        </main>

        <!-- 히스토리 영역 -->
        <footer id="historySection" class="w-full">
            <div class="flex items-center justify-between px-1 cursor-pointer py-6" onclick="toggleHistory()">
                <h2 class="font-black text-slate-800 text-xl uppercase tracking-widest flex items-center gap-3"><i id="historyIcon" class="fa-solid fa-clock-rotate-left text-blue-500 transition-transform"></i> History</h2>
                <button onclick="confirmClearAll()" class="text-sm font-black text-red-400 uppercase px-3">Clear All</button>
            </div>
            <div id="historyList" class="hidden space-y-4 px-1 pb-4"></div>
        </footer>

        <!-- 결과 출력 영역 -->
        <div id="resultArea" class="hidden space-y-[40px] w-full pt-6">
            <section id="summaryCardContainer" class="animate-in">
                <div class="bg-white border border-slate-100 rounded-[24px] overflow-hidden shadow-md">
                    <div class="bg-slate-900 px-4 py-2 text-center border-b border-transparent"><h2 id="summaryCardHeader" class="text-white font-black text-lg"></h2></div>
                    <div class="p-3 space-y-2.5" id="summaryList"></div>
                </div>
            </section>
            <div id="cardsContainer" class="space-y-[40px] pb-12 px-1 flex flex-col items-center"></div>
        </div>
    </div>

    <script>
        // 발급받으신 새로운 API 키가 적용되었습니다.
        const apiKey = "AIzaSyAr7wmH50WZb9aHTDWbBiaArBsSTDbQ6xs"; 
        let historyData = [];

        window.onload = function() {
            const saved = localStorage.getItem('pvc_calc_history_v2');
            if (saved) { try { historyData = JSON.parse(saved); renderHistory(); } catch(e) { historyData = []; } }
        };

        function haptic(ms = 20) { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(ms); }
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        // --- AI 분석 엔진 (데이터 추출 최적화) ---
        async function handlePhotoUpload(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const loader = document.getElementById('aiLoading');
            const resultArea = document.getElementById('aiResultArea');
            const photoBtn = document.getElementById('photoBtn');

            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');
            photoBtn.disabled = true;

            try {
                const base64Image = await optimizeImage(file);
                const response = await callGeminiOCR(base64Image);
                if (response && response.rows && response.rows.length > 0) {
                    renderAiList(response.rows);
                } else {
                    showToast("표 데이터를 찾지 못했습니다. 선명하게 다시 찍어주세요.");
                    loader.classList.add('hidden');
                }
            } catch (err) {
                console.error(err);
                showToast("분석 서버 지연. 잠시 후 다시 시도해 주세요.");
                loader.classList.add('hidden');
            } finally {
                photoBtn.disabled = false;
                input.value = ''; 
            }
        }

        function optimizeImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxSide = 1024;
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > maxSide) { h *= maxSide / w; w = maxSide; } }
                        else { if (h > maxSide) { w *= maxSide / h; h = maxSide; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function callGeminiOCR(base64Data) {
            const prompt = "Extract dimensions from this cutting table image. Columns: Width(가로/옆), Height(세로/높이), Quantity(수량). If you see meter values like 1.22, convert them to 122cm. Respond ONLY in pure JSON: {'rows': [{'w': 122, 'h': 102, 'q': 53}]}. No conversational text.";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            for (let i = 0; i < 3; i++) {
                try {
                    const resp = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }] })
                    });
                    if (!resp.ok) throw new Error();
                    const result = await resp.json();
                    const rawText = result.candidates[0].content.parts[0].text;
                    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                    if (jsonMatch) return JSON.parse(jsonMatch[0]);
                } catch (e) { await new Promise(r => setTimeout(r, 1000)); }
            }
            return null;
        }

        function renderAiList(rows) {
            document.getElementById('aiLoading').classList.add('hidden');
            const list = document.getElementById('photoResultList');
            list.innerHTML = rows.map((r, i) => `
                <div class="photo-row-item p-4 flex items-center justify-between border-b border-slate-200 last:border-0" onclick="applyAiRow(${r.w}, ${r.h}, ${r.q})">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-black text-slate-300">#${i+1}</span>
                        <span class="text-xl font-black text-slate-900 tabular-nums">${r.w} × ${r.h}</span>
                    </div>
                    <span class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black text-sm">${r.q}장</span>
                </div>
            `).join('');
            document.getElementById('aiResultArea').classList.remove('hidden');
            haptic(40);
        }

        function applyAiRow(w, h, q) {
            document.getElementById('w_in').value = w;
            document.getElementById('h_in').value = h;
            document.getElementById('q_goal').value = q;
            showToast("데이터 입력됨!"); haptic(25); calculate();
        }

        function closeAiResult() { document.getElementById('aiResultArea').classList.add('hidden'); }

        // --- 계산 로직 (1회 끝장) ---
        function calculate(isFromHistory = false) {
            haptic(30); if(document.activeElement) document.activeElement.blur();
            const wIn = document.getElementById('w_in').value, hIn = document.getElementById('h_in').value;
            if (!wIn || !hIn) return;
            
            const W = parseFloat(wIn), H = parseFloat(hIn), R = document.getElementById('r_in').value ? parseFloat(document.getElementById('r_in').value) : H;
            const goalN = document.getElementById('q_goal').value ? parseFloat(document.getElementById('q_goal').value) : 0;
            const doneTotal = parseFloat(document.getElementById('q_done').value) || 0;
            const Q = goalN - doneTotal;

            const wasteW = (R < W) ? 99999 : (R - W), wasteH = (R < H) ? 99999 : (R - H);
            let FIX, PULL, finalWaste, pullLabel;
            if (wasteH <= wasteW) { FIX = H; PULL = W; finalWaste = wasteH; pullLabel = "가로"; } 
            else { FIX = W; PULL = H; finalWaste = wasteW; pullLabel = "세로"; }
            
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('summaryCardHeader').innerHTML = `<span class="text-3xl font-black text-white pl-1">${fmt(W)} <small class="text-slate-500">X</small> ${fmt(H)}</span>`;
            document.getElementById('summaryList').innerHTML = `<div class="bg-slate-50 p-2.5 rounded-xl border border-slate-100 flex items-center justify-between"><span class="text-[12px] font-black text-slate-400 uppercase leading-none">Trim</span><span class="text-2xl font-black text-slate-800">폭 ${fmt(R)} - ${fmt(FIX)} = <span class="text-red-500">${fmt(finalWaste)}cm</span></span></div><div class="grid grid-cols-2 gap-2.5 mt-2.5"><div class="bg-violet-50/50 p-2 rounded-xl text-center"><span class="text-[12px] font-black text-violet-400 block mb-1">CENTER</span><span class="text-xl font-black text-violet-700">${fmtSpecial(FIX/2)}</span></div><div class="bg-emerald-50/50 p-2 rounded-xl text-center"><span class="text-[12px] font-black text-emerald-600 block mb-1">3-PART</span><span class="text-xl font-black text-emerald-900">${Math.round(FIX/3)} / ${Math.round(FIX*2/3)}</span></div></div>`;
            
            const container = document.getElementById('cardsContainer'); container.innerHTML = '';
            for (let n = 2; n <= 10; n++) {
                let totalLen = (PULL * n) + 2; if (totalLen > 1200) break;
                let floorB = (goalN > 0) ? Math.floor(Q / n) : 1;
                let totalCutCount = n + ((goalN > 0) ? Math.ceil(Q / n) : 1) + (finalWaste > 0 ? 1 : 0);
                const isRec = (goalN > 0) && (n >= Q);
                let cuts = []; for(let i=1; i<=n; i++) cuts.push(fmt(PULL * i));

                const card = document.createElement('div'); card.className = `w-full bg-white border rounded-[24px] overflow-hidden shadow-md ${isRec ? 'ring-4 ring-yellow-400 border-transparent' : 'border-slate-100'}`;
                card.innerHTML = `<div class="px-5 py-3 bg-slate-900 flex items-center justify-between border-b border-transparent"><div class="flex items-center"><span class="text-3xl font-black text-white">${fmt(W)} <small class="text-slate-500">X</small> ${fmt(H)}</span></div><div class="flex items-center gap-3">${isRec ? `<i class="fa-solid fa-crown text-yellow-400 text-2xl"></i>` : ''}<span class="bg-white/10 text-white border border-white/20 px-3 py-1.5 rounded-lg font-black text-[17px] tracking-tighter">${finalWaste > 0 ? '<i class="fa-solid fa-cut text-yellow-400"></i><i class="fa-solid fa-cut text-yellow-400" style="margin-left:4px;"></i>' : '<i class="fa-solid fa-cut text-yellow-400"></i>'} <span style="margin-left:4px;">${totalCutCount}컷</span></span></div></div><div class="px-5 pt-4 pb-3 bg-white"><div class="flex items-center justify-between"><div class="flex items-baseline gap-2 leading-none"><span class="text-4xl font-black text-slate-900 tabular-nums">${(goalN > 0) ? floorB+'회' : n+'장'}</span></div><div class="${pullLabel === '세로' ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-500'} text-[13px] px-3 py-1.5 rounded-xl font-black border-2 transition-all uppercase">${pullLabel} 당김</div></div><div class="flex items-center justify-between gap-1 mt-4"><span class="bg-blue-50 text-blue-700 text-[16px] px-4 py-2 rounded-lg font-black border-2 border-blue-100 shadow-sm leading-none flex items-center text-center px-4 uppercase">1회 ${n}장</span>${(goalN > 0) ? `<div class="bg-slate-100 text-slate-700 px-3 py-2 rounded-lg font-black border-2 border-slate-200 shadow-sm flex-1 ml-2 text-center truncate uppercase"><span class="text-[13px]"><span class="text-slate-500">잔여</span> ${Q}</span></div>` : ''}</div></div><div class="px-5 py-2 space-y-2"><div class="bg-blue-600/5 border-2 border-blue-600/10 p-4 rounded-2xl flex items-center gap-4 shadow-sm"><div class="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center text-xl shadow-md"><i class="fa-solid fa-ruler-combined"></i></div><p class="text-5xl font-black flex-1 text-center tabular-nums text-blue-600">${fmt(totalLen)}<small class="text-slate-900 text-3xl ml-1 font-black">cm</small></p></div><div class="space-y-2 pt-2 pb-5"><span class="text-rose-600 font-black text-[13px] uppercase flex items-center gap-2"><i class="fa-solid fa-scissors"></i> Cuts</span><div class="grid grid-cols-4 gap-2.5">${cuts.map(c => `<span class="data-chip text-rose-600" style="font-size:1.45rem;">${c}</span>`).join('')}</div></div></div>`;
                container.appendChild(card);
                if (isRec) break; 
            }
            if (!isFromHistory) saveToHistory(W, H, Q);
        }

        // --- 히스토리 관리 ---
        function toggleHistory() { document.getElementById('historyList').classList.toggle('hidden'); haptic(15); }
        function saveToHistory(w, h, ql) {
            const current = { id: Date.now(), w_in: w, h_in: h, q_left: ql };
            historyData.unshift(current);
            if (historyData.length > 20) historyData.pop();
            localStorage.setItem('pvc_calc_history_v2', JSON.stringify(historyData));
            renderHistory();
        }
        function renderHistory() {
            const list = document.getElementById('historyList');
            if (historyData.length === 0) { list.innerHTML = '<p class="p-8 text-center text-slate-300 font-bold uppercase">Empty History</p>'; return; }
            list.innerHTML = historyData.map(d => `<div class="bg-white p-5 rounded-[24px] shadow-sm border border-slate-100 history-card" onclick="fillFormFromHistory(${d.id})"><div class="text-2xl font-black text-slate-900 tabular-nums">${d.w_in} × ${d.h_in} <span class="text-blue-600 text-lg ml-2 font-black">잔여 ${d.q_left}</span></div></div>`).join('');
        }
        function fillFormFromHistory(id) {
            const d = historyData.find(x => x.id === id); if (!d) return;
            haptic(25); document.getElementById('w_in').value = d.w_in; document.getElementById('h_in').value = d.h_in;
            calculate(true); window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function confirmClearAll() {
            if(confirm("모든 기록을 삭제하시겠습니까?")) {
                historyData = []; localStorage.removeItem('pvc_calc_history_v2'); renderHistory(); showToast("초기화됨");
            }
        }

        // --- 기타 유틸리티 ---
        function handleEnter(event, isLast = false) { if (event.key === 'Enter') { calculate(); if (isLast) document.activeElement.blur(); } }
        function fmt(num) { return (num % 1 === 0) ? num : parseFloat(num.toFixed(1)); }
        function fmtSpecial(num) { return (num % 1 === 0) ? num : parseFloat(num.toFixed(1)); }
        function resetForm() { haptic(15); document.querySelectorAll('input').forEach(i => i.value = ''); document.getElementById('resultArea').classList.add('hidden'); closeAiResult(); }
    </script>
</body>
</html>
