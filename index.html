<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cutting Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+KR:wght@500;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: #f8fafc; padding: 15px; }
        
        /* 하단 테두리만 있는 직각 입력창 */
        input {
            border-bottom: 1px solid #cbd5e1 !important;
            border-radius: 0 !important;
            text-align: center; font-weight: 900; font-size: 1.2rem;
            width: 100%; height: 45px; background: white; outline: none;
        }
        input:focus { border-bottom-color: #2563eb !important; }

        /* 직각 버튼 및 라벨 */
        .btn-base { border-radius: 0; font-weight: 900; text-transform: uppercase; transition: 0.2s; }
        .grid-label { 
            display: flex; align-items: center; justify-content: center; height: 45px;
            font-size: 13px; font-weight: 800; border-bottom: 1px solid currentColor;
        }
        
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .data-chip { border: 2.5px solid currentColor; border-radius: 10px; padding: 8px 2px; font-weight: 900; text-align: center; width: 100%; }
        
        .loader { width: 20px; height: 20px; border: 3px solid #3b82f6; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="max-w-[380px] mx-auto space-y-4">
        <!-- 타이틀 -->
        <div class="bg-slate-900 text-white p-2 text-center text-[11px] font-black tracking-widest rounded-t-2xl">
            PVC MESH CUTTING CALCULATOR
        </div>

        <!-- 사진 분석 -->
        <div class="bg-white p-3 border-x border-slate-100 space-y-3">
            <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="analyzePhoto(this)">
            <button onclick="document.getElementById('photoInput').click()" class="w-full h-12 bg-blue-600 text-white btn-base flex items-center justify-center gap-2 shadow-lg active:scale-95">
                <i class="fa-solid fa-camera"></i> 사진 분석하기
            </button>
            
            <div id="aiLoading" class="hidden p-4 text-center bg-blue-50 border border-dashed border-blue-200">
                <span class="loader align-middle mr-2"></span> 분석 중...
            </div>

            <div id="aiResultArea" class="hidden space-y-2">
                <p class="text-[10px] font-black text-slate-400">분석 결과 (터치 시 입력)</p>
                <div id="aiList" class="bg-slate-50 border rounded-lg divide-y max-h-[200px] overflow-y-auto"></div>
            </div>
        </div>

        <!-- 입력부 -->
        <div class="bg-white p-3 border shadow-sm space-y-4">
            <div class="grid grid-cols-4 gap-3 items-center">
                <div class="grid-label text-amber-600">웨빙1</div> <input type="number" id="p1">
                <div class="grid-label text-amber-600">웨빙2</div> <input type="number" id="p2">
                <div class="grid-label text-emerald-600">원단폭</div> <div class="col-span-3"><input type="number" id="roll"></div>
                <div class="grid-label text-indigo-600">가로</div> <input type="number" id="w">
                <div class="grid-label text-indigo-600">세로</div> <input type="number" id="h">
                <div class="grid-label text-rose-600">목표수</div> <div class="col-span-3"><input type="number" id="goal"></div>
                <div class="grid-label text-slate-600">완료수</div> <div class="col-span-3"><input type="number" id="done"></div>
            </div>

            <div class="grid grid-cols-4 gap-2">
                <button onclick="location.reload()" class="btn-base border border-slate-300 bg-white p-2 text-xs">RESET</button>
                <button onclick="calc()" class="col-span-3 btn-base bg-slate-900 text-white text-lg shadow-xl active:scale-95">GENERATE PLAN</button>
            </div>
        </div>

        <!-- 결과 영역 -->
        <div id="results" class="space-y-8 pb-10"></div>
    </div>

    <script>
        const apiKey = "AIzaSyAEvKy8bOz_JHzuOE7rabJ1xeoQsu1DPm8";

        async function analyzePhoto(input) {
            if (!input.files[0]) return;
            const loader = document.getElementById('aiLoading');
            const resultArea = document.getElementById('aiResultArea');
            loader.classList.remove('hidden'); resultArea.classList.add('hidden');

            try {
                const base64 = await toBase64(input.files[0]);
                const prompt = "Extract columns: 가로(옆), 세로(높이), 발주수량. If meter values like 1.22, convert to 122cm. Respond ONLY JSON: {'rows':[{'w':122,'h':102,'q':50}]}";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }] })
                });

                const res = await resp.json();
                const text = res.candidates[0].content.parts[0].text;
                const json = JSON.parse(text.match(/\{[\s\S]*\}/)[0]); // 정밀 추출
                
                renderAiList(json.rows);
            } catch (e) {
                alert("분석 실패. 사진을 더 밝게 찍어주세요.");
            } finally {
                loader.classList.add('hidden'); input.value = '';
            }
        }

        function toBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
        }

        function renderAiList(rows) {
            const list = document.getElementById('aiList');
            list.innerHTML = rows.map(r => `
                <div class="p-3 flex justify-between items-center active:bg-blue-50" onclick="applyData(${r.w},${r.h},${r.q})">
                    <span class="font-black text-slate-800">${r.w} × ${r.h}</span>
                    <span class="bg-blue-600 text-white px-2 py-0.5 text-xs font-black rounded">${r.q}장</span>
                </div>
            `).join('');
            document.getElementById('aiResultArea').classList.remove('hidden');
        }

        function applyData(w, h, q) {
            document.getElementById('w').value = w;
            document.getElementById('h').value = h;
            document.getElementById('goal').value = q;
            calc();
        }

        function calc() {
            const wVal = parseFloat(document.getElementById('w').value);
            const hVal = parseFloat(document.getElementById('h').value);
            if (!wVal || !hVal) return;

            const roll = parseFloat(document.getElementById('roll').value) || hVal;
            const goal = parseFloat(document.getElementById('goal').value) || 0;
            const done = parseFloat(document.getElementById('done').value) || 0;
            const Q = goal - done;

            // 가로 세로 중 어느 쪽이 원단 폭에 더 잘 맞는지 자동 결정
            let FIX, PULL, pullLabel;
            if (roll >= hVal && (roll - hVal <= roll - wVal || roll < wVal)) {
                FIX = hVal; PULL = wVal; pullLabel = "가로";
            } else {
                FIX = wVal; PULL = hVal; pullLabel = "세로";
            }

            const results = document.getElementById('results');
            results.innerHTML = '';

            for (let n = 2; n <= 10; n++) {
                const totalLen = (PULL * n) + 2;
                if (totalLen > 1200) break;

                const cuts = []; for(let i=1; i<=n; i++) cuts.push(Math.round(PULL * i * 10)/10);
                const isFinal = Q > 0 && n >= Q;

                const html = `
                    <div class="card border-2 ${isFinal ? 'border-yellow-400' : 'border-white'}">
                        <div class="bg-slate-900 text-white p-3 flex justify-between items-center">
                            <span class="text-2xl font-black">${wVal} × ${hVal}</span>
                            ${isFinal ? '<i class="fa-solid fa-crown text-yellow-400"></i>' : ''}
                        </div>
                        <div class="p-4 space-y-4">
                            <div class="flex justify-between items-end">
                                <span class="text-3xl font-black">${n}장씩 재단</span>
                                <span class="text-xs font-bold text-slate-400 border px-2 py-1">${pullLabel} 당김</span>
                            </div>
                            <div class="bg-blue-50 p-4 text-center rounded-xl">
                                <span class="text-4xl font-black text-blue-600">${totalLen}</span>
                                <span class="text-xl font-bold text-slate-800 ml-1">cm</span>
                            </div>
                            <div class="space-y-2">
                                <p class="text-[11px] font-black text-rose-500 uppercase"><i class="fa-solid fa-cut"></i> Cuts</p>
                                <div class="grid grid-cols-4 gap-2">
                                    ${cuts.map(c => `<div class="data-chip text-rose-600">${c}</div>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                results.innerHTML += html;
                if (isFinal) break;
            }
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        function closeAiResult() { document.getElementById('aiResultArea').classList.add('hidden'); }
        function haptic(ms) { if(navigator.vibrate) navigator.vibrate(ms); }
    </script>
</body>
</html>
