<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>PVC Mesh Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: var(--bg); padding: 10px 14px 50px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 380px; }
        
        /* 하단 테두리만 있는 직각 입력창 */
        input {
            border-bottom: 1px solid #d1d5db !important;
            border-radius: 0 !important; border-top:none; border-left:none; border-right:none;
            text-align: center; font-weight: 700; font-size: 1.2rem;
            width: 100%; height: 44px; background: white; outline: none; transition: 0.2s;
        }
        input:focus { border-bottom-color: var(--primary) !important; background: #f0f7ff; }

        /* 라벨 */
        .grid-label {
            display: flex; align-items: center; justify-content: center;
            height: 44px; width: 100%; font-weight: 800; font-size: 13px;
            border-bottom: 1px solid currentColor; opacity: 0.85;
        }

        .action-btn { height: 48px; border-radius: 0; font-weight: 900; text-transform: uppercase; transition: 0.2s; }
        .action-btn:active { transform: scale(0.98); }

        .data-chip { border: 2.5px solid currentColor; border-radius: 10px; padding: 8px 2px; font-weight: 900; text-align: center; width: 100%; background: white; }
        
        .loader { width: 20px; height: 20px; border: 3px solid #3b82f6; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .history-item { border-left: 8px solid #cbd5e1; transition: 0.2s; }
        .history-item:active { background: #f1f5f9; }
    </style>
</head>
<body>

    <div class="app-container space-y-4">
        <!-- 타이틀 -->
        <div class="bg-slate-900 text-white p-2.5 text-center text-[11px] font-black tracking-[0.2em] rounded-t-2xl shadow-md">
            PVC MESH CUTTING CALCULATOR
        </div>

        <!-- 사진 분석 -->
        <div class="bg-white p-3 border-x border-slate-100 shadow-sm space-y-3">
            <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="handlePhoto(this)">
            <button onclick="document.getElementById('photoInput').click()" class="w-full h-12 bg-blue-600 text-white action-btn flex items-center justify-center gap-2 text-sm shadow-lg">
                <i class="fa-solid fa-camera-retro"></i> 재단데이터 사진 분석하기
            </button>
            <div id="aiLoading" class="hidden p-4 text-center bg-blue-50 border border-dashed border-blue-200 rounded-xl">
                <span class="loader mr-2"></span> <span class="text-sm font-bold text-blue-700">AI 분석 중...</span>
            </div>
            <div id="aiResultArea" class="hidden space-y-2">
                <div id="aiList" class="bg-slate-50 border rounded-xl divide-y max-h-[200px] overflow-y-auto"></div>
            </div>
        </div>

        <!-- 입력부 -->
        <div class="bg-white p-3 border rounded-b-2xl shadow-sm space-y-4">
            <div class="grid grid-cols-4 gap-3 items-center">
                <div class="grid-label text-amber-600">웨빙1</div> <input type="number" id="p1">
                <div class="grid-label text-amber-600">웨빙2</div> <input type="number" id="p2">
                <div class="grid-label text-emerald-600">원단폭</div> <div class="col-span-3"><input type="number" id="roll"></div>
                <div class="grid-label text-indigo-600">가로</div> <input type="number" id="w">
                <div class="grid-label text-indigo-600">세로</div> <input type="number" id="h">
                <div class="grid-label text-rose-600">목표수</div> <div class="col-span-3"><input type="number" id="goal"></div>
                <div class="grid-label text-slate-600">완료수</div> <div class="col-span-3"><input type="number" id="done"></div>
            </div>
            <div class="grid grid-cols-4 gap-2">
                <button onclick="resetAll()" class="action-btn border border-slate-300 bg-white text-xs font-black">RESET</button>
                <button onclick="calculate()" class="col-span-3 action-btn bg-slate-900 text-white text-lg shadow-xl">GENERATE PLAN</button>
            </div>
        </div>

        <!-- 히스토리 -->
        <div class="py-2">
            <div class="flex justify-between items-center px-1 mb-3">
                <h2 class="font-black text-slate-800 text-lg uppercase tracking-tighter"><i class="fa-solid fa-clock-rotate-left text-blue-500"></i> History</h2>
                <button onclick="clearHistory()" class="text-[11px] font-black text-red-400">CLEAR ALL</button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>

        <!-- 결과 영역 -->
        <div id="results" class="space-y-10 pt-4"></div>
    </div>

    <script>
        const apiKey = "AIzaSyAr7wmH50WZb9aHTDWbBiaArBsSTDbQ6xs";
        let history = JSON.parse(localStorage.getItem('pvc_history') || '[]');

        window.onload = () => renderHistory();

        async function handlePhoto(input) {
            if (!input.files[0]) return;
            const loader = document.getElementById('aiLoading');
            loader.classList.remove('hidden');
            
            try {
                const base64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = () => r(reader.result.split(',')[1]);
                    reader.readAsDataURL(input.files[0]);
                });

                const prompt = "Extract cutting dimensions from the table in the image. Columns: 가로(Width), 세로(Height), 수량(Qty). Meter values (e.g. 1.22) to cm (122). Respond in JSON only: {'rows':[{'w':122,'h':102,'q':50}]}";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }] })
                });

                const data = await resp.json();
                const text = data.candidates[0].content.parts[0].text;
                const json = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
                
                renderAiList(json.rows);
            } catch (e) {
                alert("분석 실패. 다시 찍어보세요.");
            } finally {
                loader.classList.add('hidden'); input.value = '';
            }
        }

        function renderAiList(rows) {
            const area = document.getElementById('aiResultArea');
            const list = document.getElementById('aiList');
            area.classList.remove('hidden');
            list.innerHTML = rows.map(r => `
                <div class="p-4 flex justify-between items-center active:bg-blue-50" onclick="applyAiData(${r.w},${r.h},${r.q})">
                    <span class="font-black text-slate-800 text-lg tabular-nums">${r.w} × ${r.h}</span>
                    <span class="bg-blue-600 text-white px-3 py-1 text-xs font-black rounded-lg">${r.q}장</span>
                </div>
            `).join('');
        }

        function applyAiData(w, h, q) {
            document.getElementById('w').value = w;
            document.getElementById('h').value = h;
            document.getElementById('goal').value = q;
            document.getElementById('aiResultArea').classList.add('hidden');
            calculate();
        }

        function calculate() {
            const wVal = parseFloat(document.getElementById('w').value);
            const hVal = parseFloat(document.getElementById('h').value);
            if (!wVal || !hVal) return;

            const roll = parseFloat(document.getElementById('roll').value) || hVal;
            const goal = parseFloat(document.getElementById('goal').value) || 0;
            const done = parseFloat(document.getElementById('done').value) || 0;
            const Q = goal - done;

            // 방향 자동 설정 (낭비 적은 쪽)
            let PULL, pullLabel;
            if (roll >= hVal && (roll - hVal <= roll - wVal || roll < wVal)) {
                PULL = wVal; pullLabel = "가로";
            } else {
                PULL = hVal; pullLabel = "세로";
            }

            const results = document.getElementById('results');
            results.innerHTML = '';

            for (let n = 2; n <= 10; n++) {
                const totalLen = (PULL * n) + 2;
                if (totalLen > 1200) break;

                const isFinal = Q > 0 && n >= Q;
                const cuts = []; for(let i=1; i<=n; i++) cuts.push(Math.round(PULL * i * 10)/10);

                results.innerHTML += `
                    <div class="bg-white border-2 rounded-[28px] overflow-hidden shadow-lg ${isFinal ? 'border-yellow-400 ring-4 ring-yellow-400/10' : 'border-slate-100'}">
                        <div class="bg-slate-900 text-white p-4 flex justify-between items-center">
                            <span class="text-2xl font-black tabular-nums">${wVal} × ${hVal}</span>
                            ${isFinal ? '<i class="fa-solid fa-crown text-yellow-400"></i>' : '<i class="fa-solid fa-cut text-blue-500 opacity-40"></i>'}
                        </div>
                        <div class="p-5 space-y-5">
                            <div class="flex justify-between items-center">
                                <span class="text-3xl font-black text-slate-800">1회 ${n}장 재단</span>
                                <span class="text-[10px] font-black text-slate-400 border px-2 py-1 uppercase rounded">${pullLabel} 당김</span>
                            </div>
                            <div class="bg-blue-50 p-6 text-center rounded-2xl border border-blue-100">
                                <span class="text-5xl font-black text-blue-600 tabular-nums">${totalLen}</span><span class="text-2xl font-black text-slate-900 ml-1">cm</span>
                            </div>
                            <div class="space-y-2">
                                <p class="text-[11px] font-black text-rose-500 uppercase flex items-center gap-1.5"><i class="fa-solid fa-scissors"></i> Cuts</p>
                                <div class="grid grid-cols-4 gap-2.5">
                                    ${cuts.map(c => `<div class="data-chip text-rose-600" style="font-size:1.4rem;">${c}</div>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                if (isFinal) break;
            }
            saveHistory(wVal, hVal, Q);
            window.scrollTo({ top: 500, behavior: 'smooth' });
        }

        function saveHistory(w, h, ql) {
            history = history.filter(i => !(i.w === w && i.h === h));
            history.unshift({ w, h, ql, id: Date.now() });
            if (history.length > 20) history.pop();
            localStorage.setItem('pvc_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (history.length === 0) { list.innerHTML = '<p class="text-center p-6 text-slate-300 font-bold">No History</p>'; return; }
            list.innerHTML = history.map(h => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 history-item" onclick="applyHistory(${h.id})">
                    <div class="text-2xl font-black text-slate-900 tabular-nums">${h.w} × ${h.h} <span class="text-blue-600 text-lg ml-2">잔여 ${h.ql}</span></div>
                </div>
            `).join('');
        }

        function applyHistory(id) {
            const h = history.find(x => x.id === id);
            if (!h) return;
            document.getElementById('w').value = h.w;
            document.getElementById('h').value = h.h;
            calculate();
        }

        function clearHistory() { if(confirm("기록을 삭제할까요?")) { history=[]; localStorage.removeItem('pvc_history'); renderHistory(); } }
        function resetAll() { location.reload(); }
        function handleEnter(e) { if(e.key === 'Enter') calculate(); }
    </script>
</body>
</html>
